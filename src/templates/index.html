<!DOCTYPE html>
<html>
<head>
    <title>图书管理助手</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #4CAF50; color: white; }
        .btn { padding: 5px 10px; margin: 2px; cursor: pointer; }
        .add-btn { background: #4CAF50; color: white; border: none; padding: 10px 20px; margin-bottom: 20px; }
        .search-box { padding: 8px; width: 300px; margin-right: 10px; }
        .export-btn { background: #2196F3; color: white; border: none; padding: 8px 16px; margin-left: 10px; cursor: pointer; }
        .batch-delete-btn { background: #f44336; color: white; border: none; padding: 8px 16px; margin-left: 10px; cursor: pointer; display: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 100px auto; padding: 20px; width: 500px; border-radius: 8px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0 15px 0; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #e0e0e0; padding: 15px; border-radius: 8px; }
        .select-all-cell { width: 40px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 图书管理助手</h1>
    
    <div class="stats" id="stats"></div>
    
    <button class="add-btn" onclick="openAddModal()">+ 添加图书</button>
    
    <form method="get" style="display: inline-block;">
        <input type="text" name="search" class="search-box" placeholder="按书名或作者搜索" value="{{ search }}">
        <button type="submit">搜索</button>
    </form>
    <button class="export-btn" onclick="exportCSV()">📥 导出 CSV</button>
    <button class="batch-delete-btn" id="batchDeleteBtn" onclick="batchDelete()">🗑 批量删除</button>
    
    <table>
        <thead>
            <tr>
                <th class="select-all-cell"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                <th>ID</th><th>书名</th><th>作者</th><th>分类</th><th>位置</th><th>状态</th><th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td class="select-all-cell"><input type="checkbox" class="book-checkbox" value="{{ book.id }}" onchange="updateBatchDeleteBtn()"></td>
                <td>{{ book.id }}</td>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.category_name or '无' }}</td>
                <td>{{ book.location or '-' }}</td>
                <td>{{ book.status }}</td>
                <td>
                    <button class="btn" onclick="editBook({{ book.id }})">编辑</button>
                    <button class="btn" onclick="deleteBook({{ book.id }})">删除</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">添加图书</h2>
        <form id="bookForm">
            <input type="hidden" id="bookId">
            <label>书名*</label><input type="text" id="title" required>
            <label>作者*</label><input type="text" id="author" required>
            <label>ISBN</label><input type="text" id="isbn">
            <label>分类</label>
            <select id="categoryId">
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
            <label>位置</label><input type="text" id="location">
            <label>状态</label>
            <select id="status"><option>未读</option><option>在读</option><option>已读</option></select>
            <button type="submit">保存</button>
            <button type="button" onclick="closeModal()">取消</button>
        </form>
    </div>
</div>

<script>
    async function loadStats() {
        const res = await fetch('/stats');
        const data = await res.json();
        let html = `<div class="stat-card">📖 总图书: ${data.total}</div>`;
        for (let cat of data.by_category) {
            html += `<div class="stat-card">📂 ${cat.name}: ${cat.count}</div>`;
        }
        document.getElementById('stats').innerHTML = html;
    }
    
    function openAddModal() {
        document.getElementById('modalTitle').innerText = '添加图书';
        document.getElementById('bookForm').reset();
        document.getElementById('bookId').value = '';
        document.getElementById('modal').style.display = 'block';
    }
    
    async function editBook(id) {
        const res = await fetch(`/book/get/${id}`);
        const book = await res.json();
        document.getElementById('modalTitle').innerText = '编辑图书';
        document.getElementById('bookId').value = book.id;
        document.getElementById('title').value = book.title;
        document.getElementById('author').value = book.author;
        document.getElementById('isbn').value = book.isbn || '';
        document.getElementById('categoryId').value = book.category_id;
        document.getElementById('location').value = book.location || '';
        document.getElementById('status').value = book.status;
        document.getElementById('modal').style.display = 'block';
    }
    
    document.getElementById('bookForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('bookId').value;
        const formData = new FormData();
        formData.append('title', document.getElementById('title').value);
        formData.append('author', document.getElementById('author').value);
        formData.append('isbn', document.getElementById('isbn').value);
        formData.append('category_id', document.getElementById('categoryId').value);
        formData.append('location', document.getElementById('location').value);
        formData.append('status', document.getElementById('status').value);
        
        const url = id ? `/book/update/${id}` : '/book/add';
        await fetch(url, { method: 'POST', body: formData });
        location.reload();
    };
    
    async function deleteBook(id) {
        if (confirm('确定删除吗？')) {
            await fetch(`/book/delete/${id}`);
            location.reload();
        }
    }
    
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    function exportCSV() {
        const searchInput = document.querySelector('input[name="search"]');
        const search = searchInput ? searchInput.value : '';
        let url = '/export/csv';
        if (search) {
            url += '?search=' + encodeURIComponent(search);
        }
        window.location.href = url;
    }
    
    // 全选/取消全选
    function toggleSelectAll() {
        const selectAll = document.getElementById('selectAll');
        const checkboxes = document.querySelectorAll('.book-checkbox');
        checkboxes.forEach(cb => cb.checked = selectAll.checked);
        updateBatchDeleteBtn();
    }
    
    // 更新批量删除按钮显示状态
    function updateBatchDeleteBtn() {
        const checkedCount = document.querySelectorAll('.book-checkbox:checked').length;
        const batchBtn = document.getElementById('batchDeleteBtn');
        if (checkedCount > 0) {
            batchBtn.style.display = 'inline-block';
            batchBtn.innerText = '🗑 批量删除(' + checkedCount + ')';
        } else {
            batchBtn.style.display = 'none';
        }
    }
    
    // 批量删除
    async function batchDelete() {
        const checkedBoxes = document.querySelectorAll('.book-checkbox:checked');
        const ids = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
        
        if (ids.length === 0) return;
        
        if (!confirm('确定要删除选中的 ' + ids.length + ' 本图书吗？此操作不可恢复。')) return;
        
        const res = await fetch('/book/batch_delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids: ids })
        });
        const data = await res.json();
        if (data.success) {
            location.reload();
        } else {
            alert('删除失败：' + (data.message || '未知错误'));
        }
    }
    
    loadStats();
</script>
</body>
</html>
